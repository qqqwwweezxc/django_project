{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'home/css/main.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css"">
</head>
<body>
    <aside>
        <h3>Navigate <i class="fa-solid fa-compass"></i></h3>
        <ul>
            <li><a href="{% url 'home' %}"><i class="fa-solid fa-house"></i> Main</a></li>
            <li><a href="{% url 'about' %}"><i class="fa-solid fa-circle-info"></i> About us</a></li>
            <li><a href="{% url 'contact' %}"><i class="fa-solid fa-address-book"></i> Contacts</a></li>
        </ul>
    </aside>
    <main>
        {% block body %}
        {% endblock %}
    </main>
</body>
</html>
